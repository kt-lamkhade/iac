apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-deploy
  namespace: kiran
  annotations:
    kubernetes.io/change-cause: "blue-green deployment for nginx"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: c1
        image: nginx


