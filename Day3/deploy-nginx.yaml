apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-nginx
  namespace: kiran
  annotations:
    kubernetes.io/change-cause: "canary deployment for nginx"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: c1
        image: nginx