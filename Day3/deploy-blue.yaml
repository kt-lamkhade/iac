apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-deploy
  namespace: kiran
  annotations:
    kubernetes.io/change-cause: "blue-green deployment for caddy"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
      - name: c1
        image: caddy


