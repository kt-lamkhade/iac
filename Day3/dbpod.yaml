apiVersion: v1
kind: Pod
metadata:
  name: mysql
  namespace: kiran
  labels:
    env: dev
    user: kiran
spec:
  containers:
  - name: c1
    image: mysql
    env:
    - name: MYSQL_ROOT_PASSWORD
      valueFrom:
        configMapKeyRef:
          name: cm1
          key: root-pass
    - name: MYSQL_DATABASE
      valueFrom:
        configMapKeyRef:
          name: cm1
          key: sql-db